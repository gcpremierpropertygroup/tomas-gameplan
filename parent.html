<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Tomas — Parent View</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;
  --s1:#161b22;--s2:#1c2128;--s3:#22272e;
  --text:#e6edf3;--text2:#7d8590;--text3:#3d444d;
  --border:rgba(48,54,61,.8);--border2:rgba(62,70,82,.9);
  --red:#f85149;--red-bg:rgba(248,81,73,.1);--red-border:rgba(248,81,73,.2);
  --amber:#e3b341;--amber-bg:rgba(227,179,65,.1);--amber-border:rgba(227,179,65,.2);
  --blue:#58a6ff;--blue-bg:rgba(88,166,255,.08);--blue-border:rgba(88,166,255,.18);
  --green:#3fb950;--green-bg:rgba(63,185,80,.08);--green-border:rgba(63,185,80,.18);
  --radius:10px;
}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;overflow-x:hidden;
}

/* ── Header ── */
.header{
  padding:20px 20px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.header-left{display:flex;align-items:center;gap:12px}
.header-avatar{
  width:36px;height:36px;border-radius:8px;
  background:var(--s3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.5px;
}
.header-title{font-size:17px;font-weight:600;letter-spacing:-.02em}
.header-sub{font-size:12px;color:var(--text3);margin-top:1px}

/* ── Sync bar ── */
.sync-bar{
  padding:10px 20px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border);
}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-dot.syncing{background:var(--amber);animation:blink 1.2s ease infinite}
.sync-dot.error{background:var(--red)}
.sync-text{font-size:12px;color:var(--text3);flex:1}

/* ── Stats ── */
@keyframes statsIn{from{opacity:0}to{opacity:1}}
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);
  border-bottom:1px solid var(--border);
  animation:statsIn .3s ease both;
}
.stat-card{
  background:var(--bg);padding:16px 12px;text-align:center;
  cursor:default;transition:background .2s,transform .15s;
  position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:currentColor;opacity:0;transition:opacity .2s;
}
.stat-card:hover{background:var(--s1)}
.stat-card:hover::after{opacity:.4}
.stat-num{font-size:26px;font-weight:700;letter-spacing:-.03em;line-height:1;transition:transform .2s}
.stat-card:hover .stat-num{transform:scale(1.08)}
.stat-label{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-top:5px}
.stat-overdue{color:var(--red)}.stat-overdue .stat-num{color:var(--red)}
.stat-pending{color:var(--amber)}.stat-pending .stat-num{color:var(--amber)}
.stat-progress{color:var(--blue)}.stat-progress .stat-num{color:var(--blue)}
.stat-done{color:var(--green)}.stat-done .stat-num{color:var(--green)}

/* ── Sections ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.section{padding:0 16px;margin-bottom:24px;animation:fadeInUp .35s ease both}
.section-title{
  font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text3);margin-bottom:10px;padding-top:20px;
  display:flex;align-items:center;gap:8px;
  transition:color .2s;
}
.section:hover .section-title{color:var(--text2)}
.section-title-bar{flex:1;height:1px;background:var(--border)}

/* ── Big 3 Card ── */
.big3-card{
  border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:border-color .2s,box-shadow .2s;
}
.big3-card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,.25)}
.big3-date{
  font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.04em;text-transform:uppercase;
  padding:11px 16px;border-bottom:1px solid var(--border);background:var(--s1);
}
.big3-item{
  display:flex;align-items:center;gap:12px;padding:13px 16px;
  border-bottom:1px solid var(--border);
  transition:background .15s;
}
.big3-item:hover{background:var(--s2)}
.big3-item:last-child{border-bottom:none}
.big3-num{
  width:24px;height:24px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;
}
.big3-num.n1{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.big3-num.n2{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.big3-num.n3{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.big3-text{font-size:14px;font-weight:400;flex:1;line-height:1.35;color:var(--text)}
.big3-check{font-size:15px;flex-shrink:0;color:var(--text3)}
.big3-check.done{color:var(--green)}
.big3-empty{font-size:13px;color:var(--text3);padding:20px 16px;text-align:center}

/* ── Day Group ── */
.day-group{margin-bottom:14px}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.day-label{font-size:12px;font-weight:600;letter-spacing:.01em;white-space:nowrap}
.day-label.overdue-day{color:var(--red)}
.day-label.today-day{color:var(--blue)}
.day-label.future-day{color:var(--text2)}
.day-line{flex:1;height:1px;background:var(--border)}
.day-count{font-size:11px;color:var(--text3);font-weight:500;white-space:nowrap}

/* ── HW Cards ── */
.hw-card{
  background:var(--s1);border:1px solid var(--border);
  border-left-width:3px;
  border-radius:var(--radius);
  margin-bottom:6px;display:flex;align-items:center;gap:0;
  cursor:pointer;overflow:hidden;
  transition:background .15s,transform .12s,box-shadow .15s;
}
.hw-card:hover{background:var(--s2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.35)}
.hw-card:active{background:var(--s3);transform:none;box-shadow:none}
.hw-card-overdue{border-left-color:var(--red)}
.hw-card-pending{border-left-color:var(--amber)}
.hw-card-in-progress{border-left-color:var(--blue)}
.hw-card-done{border-left-color:var(--green);opacity:.65}
.hw-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hw-status-dot.overdue{background:var(--red)}
.hw-status-dot.pending{background:var(--amber)}
.hw-status-dot.in-progress{background:var(--blue)}
.hw-status-dot.done{background:var(--green)}
.hw-card-body{flex:1;min-width:0}
.hw-name{font-size:14px;font-weight:500;line-height:1.3;color:var(--text)}
.hw-name.done-name{text-decoration:line-through;color:var(--text3)}
.hw-meta{font-size:11px;color:var(--text3);margin-top:3px}
.hw-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.hw-tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;line-height:1.5;letter-spacing:.01em}
.hw-tag-subject{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.hw-tag-due{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border2)}
.hw-tag-due.due-overdue{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.hw-tag-due.due-today{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.hw-tag-p1{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.hw-tag-p2{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.hw-tag-p3{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.hw-badge{
  font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  padding:3px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0;
}
.badge-overdue{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-in-progress{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.badge-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}

/* ── Activity Feed ── */
.activity-item{
  display:flex;align-items:flex-start;gap:11px;
  padding:11px 8px;margin:0 -8px;border-bottom:1px solid var(--border);
  border-radius:8px;transition:background .15s;
}
.activity-item:hover{background:var(--s1)}
.activity-item:last-child{border-bottom:none}
.activity-icon{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
  border:1px solid var(--border);
  transition:transform .15s;
}
.activity-item:hover .activity-icon{transform:scale(1.1)}
.activity-icon.added{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.activity-icon.completed{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
.activity-icon.deleted{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.activity-icon.status_change{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.activity-icon.other{background:var(--s2);color:var(--text3)}
.activity-text{font-size:13px;line-height:1.45;color:var(--text2)}
.activity-text strong{color:var(--text);font-weight:600}
.activity-time{font-size:11px;color:var(--text3);margin-top:2px}

/* ── States ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:36px;margin-bottom:14px;opacity:.5}
.empty-state p{font-size:14px;line-height:1.6;color:var(--text3)}

.loading{text-align:center;padding:80px 20px}
.spinner{
  width:24px;height:24px;
  border:2px solid var(--s3);border-top-color:var(--text3);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--text3);font-size:13px}

.error-state{text-align:center;padding:60px 20px}
.error-state .icon{font-size:28px;margin-bottom:10px;opacity:.6}
.error-state p{font-size:13px;color:var(--text3);margin-top:6px;line-height:1.5}

.bottom-spacer{height:48px}

/* ── Drawer ── */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;
}
.drawer-overlay.show{opacity:1;pointer-events:all}
.drawer{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--s1);
  border-top:1px solid var(--border2);
  border-radius:14px 14px 0 0;
  z-index:101;padding:0 20px 44px;
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  max-height:85vh;overflow-y:auto;
}
.drawer.show{transform:translateY(0)}
.drawer-handle{
  width:32px;height:3px;background:var(--s3);
  border-radius:2px;margin:12px auto 20px;
}
.drawer-subject-badge{
  display:inline-block;font-size:10px;font-weight:600;
  padding:3px 10px;border-radius:5px;letter-spacing:.06em;text-transform:uppercase;
  background:var(--s2);color:var(--text2);border:1px solid var(--border2);margin-bottom:12px;
}
.drawer-name{
  font-size:20px;font-weight:600;line-height:1.3;
  letter-spacing:-.02em;margin-bottom:16px;color:var(--text);
}
.drawer-name.done-name{text-decoration:line-through;color:var(--text3)}
.drawer-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.drawer-cell{
  background:var(--s1);border:1px solid var(--border);
  border-radius:8px;padding:12px;
}
.drawer-cell-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.drawer-cell-val{font-size:14px;font-weight:500;color:var(--text)}
.drawer-status-row{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:8px;margin-bottom:14px;
  border:1px solid var(--border);background:var(--s1);
}
.drawer-close{
  width:100%;padding:13px;
  border:1px solid var(--border2);border-radius:8px;
  background:transparent;color:var(--text2);
  font-size:13px;font-weight:500;font-family:inherit;
  cursor:pointer;transition:background .15s,color .15s;letter-spacing:.01em;
}
.drawer-close:hover{background:var(--s2);color:var(--text)}
.drawer-close:active{background:var(--s3)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* ── Refresh btn hover ── */
.refresh-btn{
  padding:5px 12px;border-radius:6px;
  border:1px solid var(--border2);
  background:transparent;color:var(--text2);
  font-size:12px;font-family:inherit;font-weight:500;
  cursor:pointer;transition:background .15s,color .15s,transform .1s;
}
.refresh-btn:hover{background:var(--s2);color:var(--text);transform:scale(1.03)}
.refresh-btn:active{background:var(--s3);transform:none}

@media(max-width:400px){.stats{grid-template-columns:repeat(2,1fr)}}

/* History panel */
#history-panel{position:fixed;inset:0;background:var(--bg);z-index:9000;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
#history-panel.open{transform:translateY(0)}
#history-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0;flex-shrink:0}
#history-title{font-size:17px;font-weight:600;color:var(--text)}
#history-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--s2);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
#history-tabs{display:flex;gap:6px;padding:12px 16px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#history-tabs::-webkit-scrollbar{display:none}
.htab{padding:6px 13px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s,color .15s}
.htab.active{background:var(--s3);color:var(--text);border-color:var(--border2)}
#history-body{flex:1;overflow-y:auto;padding:0 16px 24px}
.hlog-day{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.hlog-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.hlog-item:last-child{border-bottom:none}
.hlog-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.hlog-dot.added{background:var(--green)}
.hlog-dot.completed{background:var(--blue)}
.hlog-dot.deleted{background:var(--red)}
.hlog-dot.status_change{background:var(--amber)}
.hlog-dot.check_in{background:#a78bfa}
.hlog-dot.cancelled{background:var(--red)}
.hlog-dot.other{background:var(--text3)}
.hlog-text{font-size:13px;color:var(--text2);line-height:1.4;flex:1}
.hlog-text strong{color:var(--text);font-weight:600}
.hlog-time{font-size:11px;color:var(--text3);margin-top:2px}
.hlog-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}

/* Confirm modal */
#confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px}
#confirm-overlay.open{display:flex}
#confirm-box{background:var(--s1);border:1px solid var(--border2);border-radius:14px;padding:24px 20px;max-width:320px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.6)}
#confirm-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px}
#confirm-msg{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5}
#confirm-actions{display:flex;gap:10px}
#confirm-cancel{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
#confirm-ok{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,71,87,.4);background:rgba(255,71,87,.12);color:#ff4757;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
#confirm-cancel:hover{background:var(--s3)}
#confirm-ok:hover{background:rgba(255,71,87,.22)}
</style>
</head>
<body>

<!-- Confirm Delete Modal -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <div id="confirm-title">Delete this?</div>
    <div id="confirm-msg">This can't be undone.</div>
    <div id="confirm-actions">
      <button id="confirm-cancel" onclick="confirmResolve(false)">Cancel</button>
      <button id="confirm-ok" onclick="confirmResolve(true)">Delete</button>
    </div>
  </div>
</div>

<!-- History Panel -->
<div id="history-panel">
  <div id="history-header">
    <div id="history-title">Activity History</div>
    <button id="history-close" onclick="closeHistory()">×</button>
  </div>
  <div id="history-tabs">
    <button class="htab active" onclick="setHistoryTab('all',this)">All</button>
    <button class="htab" onclick="setHistoryTab('homework',this)">Homework</button>
    <button class="htab" onclick="setHistoryTab('checkin',this)">Check-Ins</button>
    <button class="htab" onclick="setHistoryTab('goals',this)">Daily Goals</button>
    <button class="htab" onclick="setHistoryTab('cancelled',this)">Cancelled</button>
    <button class="htab" onclick="setHistoryTab('deleted',this)">Deleted</button>
  </div>
  <div id="history-body"></div>
</div>

<div class="header">
  <div class="header-left">
    <div class="header-avatar">TG</div>
    <div>
      <div class="header-title">Tomas Tracker</div>
      <div class="header-sub">Parent view</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button onclick="openHistory()" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;" title="View history">📋 Log</button>
    <button onclick="showSetup()" style="padding:6px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-family:inherit;font-size:14px;cursor:pointer;line-height:1" title="Change Apps Script URL">⚙</button>
    <button onclick="openResetModal()" style="padding:6px 12px;border-radius:6px;border:1px solid var(--red-border);background:var(--red-bg);color:var(--red);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;">Reset Data</button>
  </div>
</div>

<div class="sync-bar">
  <div class="sync-dot" id="syncDot"></div>
  <span class="sync-text" id="syncText">Connecting...</span>
  <button class="refresh-btn" onclick="fetchData()">Refresh</button>
</div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
</div>

<div class="bottom-spacer"></div>

<script>
const SCRIPT_URL = localStorage.getItem('tg_parent_url') || 'https://script.google.com/macros/s/AKfycbxfextS2QR0uPUlldssr-RfVsXkqkoSR88qJDOcm60bBotFMXcx_JIkXjCbmBMxKBzX/exec';

function $(s){return document.querySelector(s)}

function getStatusInfo(hw) {
  const today = new Date().toISOString().slice(0,10);
  const status = (hw.status || 'not-started').toLowerCase();
  if (status === 'done') return {cls:'done', badge:'Done', badgeCls:'badge-done'};
  if (status === 'in-progress') return {cls:'in-progress', badge:'In Progress', badgeCls:'badge-in-progress'};
  if (hw.due && hw.due < today) return {cls:'overdue', badge:'Overdue', badgeCls:'badge-overdue'};
  return {cls:'pending', badge:'To Do', badgeCls:'badge-pending'};
}

function formatDue(due) {
  if (!due || due === 'Invalid Date') return '';
  try {
    const d = new Date(due + 'T00:00:00');
    if (isNaN(d.getTime())) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    if (diff < 0) return Math.abs(diff) + 'd overdue';
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Tomorrow';
    return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
  } catch(e) { return ''; }
}

function formatTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
    const itemDay = new Date(d); itemDay.setHours(0,0,0,0);
    const timeStr = d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true});
    if (itemDay.getTime() === today.getTime()) return 'Today at ' + timeStr;
    if (itemDay.getTime() === yesterday.getTime()) return 'Yesterday at ' + timeStr;
    return d.toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' at ' + timeStr;
  } catch(e) { return ''; }
}

function actionIcon(action) {
  if (action === 'added') return '+';
  if (action === 'completed') return '✓';
  if (action === 'deleted') return '✕';
  if (action === 'status_change') return '↻';
  return '•';
}

function actionText(item) {
  const name = '<strong>' + escHtml(item.name || 'Unknown') + '</strong>';
  if (item.action === 'added') return name + ' was added';
  if (item.action === 'completed') return name + ' marked complete';
  if (item.action === 'deleted') return name + ' was removed';
  if (item.action === 'status_change') return name + ' → ' + escHtml(item.status || '');
  return name + ' updated';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderBig3(dailyGoals) {
  const todayKey = new Date().toISOString().slice(0,10);
  const todayGoals = (dailyGoals || []).find(g => g.date === todayKey);

  let html = '<div class="section">';
  html += '<div class="section-title">Today\'s Big 3<span class="section-title-bar"></span></div>';
  html += '<div class="big3-card">';

  const todayStr = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  html += '<div class="big3-date">' + todayStr + '</div>';

  if (!todayGoals) {
    html += '<div class="big3-empty">No goals set yet today</div>';
  } else {
    const goals = [todayGoals.goal1, todayGoals.goal2, todayGoals.goal3];
    const checks = todayGoals.checks ? String(todayGoals.checks).split('') : [];
    const numClasses = ['n1','n2','n3'];
    goals.forEach((g, i) => {
      if (!g) return;
      const done = checks[i] === '1';
      html += '<div class="big3-item">';
      html += '<div class="big3-num ' + numClasses[i] + '">' + (i+1) + '</div>';
      html += '<div class="big3-text" style="' + (done ? 'text-decoration:line-through;color:var(--text3)' : '') + '">' + escHtml(g) + '</div>';
      html += '<div class="big3-check' + (done ? ' done' : '') + '">' + (done ? '✓' : '○') + '</div>';
      html += '</div>';
    });
  }

  html += '</div></div>';
  return html;
}

function renderCheckIn(checkIns) {

  const qs = [
    {key:'q1', label:'What went well?'},
    {key:'q2', label:'Where did he get stuck?'},
    {key:'q3', label:'Biggest thing next week?'},

  checkIns.forEach(function(ci, idx) {

    // Header — always visible, click to expand/collapse older entries

    html += '<div onclick="toggleCheckIn(\'' + entryId + '\')" style="flex:1;display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none">';
    html += '<div>';

    if (ci.savedAt) html += '<div style="font-size:11px;color:var(--text3);margin-top:2px">Saved ' + formatTime(ci.savedAt) + '</div>';
    html += '</div>';

    html += '</div>';
    html += '<button onclick="deleteCheckIn(' + ci.rowIndex + ',this)" style="flex-shrink:0;width:36px;height:36px;margin-right:10px;border-radius:8px;border:1px solid rgba(255,71,87,.3);background:rgba(255,71,87,.08);color:#ff4757;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1">×</button>';

    });
    if (!hasAny) html += '<div style="font-size:13px;color:var(--text3);text-align:center;padding:8px 0">No answers recorded</div>';
    html += '</div>';
    html += '</div>';
  });

  return html;

function renderWeekScores(weeklyScores) {
  if (!weeklyScores || !weeklyScores.length) return '';
  const ws = weeklyScores[0];
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const cats = ['big3','power','phone','hwin'];
  const catLabels = ['Big 3','Power','Phone','HW'];
  let total = 0;
  days.forEach(function(d){ cats.forEach(function(c){ if(ws.days[d] && ws.days[d][c]) total++; }); });
  const pct = Math.round(total/28*100);
  const scoreColor = total>=20?'var(--green)':total>=14?'var(--amber)':'var(--red)';
  let html = '<div class="section">';
  html += '<div class="section-title">This Week\'s Scores<span class="section-title-bar"></span></div>';
  html += '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:14px">';
  html += '<span style="font-size:28px;font-weight:800;color:'+scoreColor+'">'+total+'</span>';
  html += '<span style="font-size:13px;color:var(--text3)">/ 28 &nbsp;·&nbsp; '+pct+'%</span>';
  html += '<span style="font-size:11px;color:var(--text3);margin-left:4px">Week of '+escHtml(String(ws.week))+'</span>';
  html += '</div>';
  // Grid header
  html += '<div style="display:grid;grid-template-columns:36px repeat(4,1fr);gap:4px;margin-bottom:4px">';
  html += '<div></div>';
  catLabels.forEach(function(l){ html += '<div style="font-size:10px;font-weight:700;color:var(--text3);text-align:center;text-transform:uppercase;letter-spacing:.4px">'+l+'</div>'; });
  html += '</div>';
  // Rows
  days.forEach(function(d){
    const dayTotal = cats.filter(function(c){ return ws.days[d] && ws.days[d][c]; }).length;
    const rowColor = dayTotal>=3?'var(--green)':dayTotal>=2?'var(--amber)':'var(--text3)';
    html += '<div style="display:grid;grid-template-columns:36px repeat(4,1fr);gap:4px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--text2)">'+d+'</div>';
    cats.forEach(function(c){
      const on = ws.days[d] && ws.days[d][c];
      html += '<div style="display:flex;justify-content:center">';
      html += '<div style="width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;'+(on?'background:rgba(61,184,122,.15);color:var(--green)':'background:var(--surface2);color:var(--text3)')+'">'+( on?'✓':'·')+'</div>';
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderDashboard(data) {
  const hw = data.homework || [];
  const activity = (data.activity || []).filter(a => {
    return a.action !== 'big3_locked';
  });
  const dailyGoals = data.dailyGoals || [];

  const today = new Date().toISOString().slice(0,10);
  let overdue=0, pending=0, inProgress=0, done=0;
  hw.forEach(h => {
    const s = (h.status||'not-started').toLowerCase();
    if (s === 'done') { done++; return; }
    if (s === 'in-progress') inProgress++; else pending++;
    if (h.due && h.due < today) overdue++;
  });
  // Also count completions logged in activity (covers items completed then removed from sheet)
  const activityDone = new Set();
  (data.activity || []).forEach(a => {
    if (a.action === 'completed' && a.name) activityDone.add(a.name);
  });
  // Subtract any that are still in hw as done (already counted above)
  hw.filter(h => (h.status||'').toLowerCase() === 'done').forEach(h => activityDone.delete(h.name));
  done += activityDone.size;

  const _af = window._hwFilter || 'all';
  let html = '';

  // Stats (clickable filters)
  html += '<div class="stats">';
  html += '<div class="stat-card stat-overdue'+(_af==='overdue'?' stat-active':'')+'" onclick="setHWFilter(\'overdue\')"><div class="stat-num">' + overdue + '</div><div class="stat-label">Overdue</div></div>';
  html += '<div class="stat-card stat-pending'+(_af==='pending'?' stat-active':'')+'" onclick="setHWFilter(\'pending\')"><div class="stat-num">' + pending + '</div><div class="stat-label">To Do</div></div>';
  html += '<div class="stat-card stat-progress'+(_af==='doing'?' stat-active':'')+'" onclick="setHWFilter(\'doing\')"><div class="stat-num">' + inProgress + '</div><div class="stat-label">Doing</div></div>';
  html += '<div class="stat-card stat-done'+(_af==='done'?' stat-active':'')+'" onclick="setHWFilter(\'done\')"><div class="stat-num">' + done + '</div><div class="stat-label">Done</div></div>';
  html += '</div>';

  // Insight banner
  html += renderInsightBanner(hw, today);

  // Today's Big 3
  html += renderBig3(dailyGoals);
  html += renderWeekScores(data.weeklyScores || []);
  html += renderCheckIn(data.checkIns || []);

  // Recent activity inline
  html += renderRecentActivity(activity);

  // Apply filter
  let hwView = hw;
  if (_af === 'overdue') hwView = hw.filter(h => (h.status||'not-started') !== 'done' && h.due && h.due < today);
  else if (_af === 'pending') hwView = hw.filter(h => ['not-started',''].includes((h.status||'not-started').toLowerCase()));
  else if (_af === 'doing') hwView = hw.filter(h => (h.status||'not-started').toLowerCase() === 'in-progress');
  else if (_af === 'done') hwView = hw.filter(h => (h.status||'not-started').toLowerCase() === 'done');

  // Filter label
  if (_af !== 'all') {
    const filterLabels = {overdue:'Overdue', pending:'To Do', doing:'In Progress', done:'Completed'};
    html += '<div style="padding:8px 16px 0"><span style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase">Showing: ' + filterLabels[_af] + ' · <span onclick="setHWFilter(\'all\')" style="color:var(--blue);cursor:pointer;text-decoration:underline">Clear</span></span></div>';
  }

  // Homework grouped by due date
  if (hwView.length > 0) {
    const groups = {};
    hwView.forEach(h => {
      const key = h.due || 'no-date';
      if (!groups[key]) groups[key] = [];
      groups[key].push(h);
    });
    const sortedKeys = Object.keys(groups).sort((a,b) => {
      if (a === 'no-date') return 1;
      if (b === 'no-date') return -1;
      return a < b ? -1 : 1;
    });

    html += '<div class="section">';
    html += '<div class="section-title">Homework<span class="section-title-bar"></span></div>';

    sortedKeys.forEach(key => {
      const items = groups[key];
      const isNoDate = key === 'no-date';
      const isOverdue = !isNoDate && key < today;
      const isToday = key === today;

      let dayLabel = 'No Due Date';
      if (!isNoDate) {
        const d = new Date(key + 'T12:00:00');
        const diff = Math.round((d - new Date(today + 'T12:00:00')) / 86400000);
        if (diff < 0) dayLabel = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) + ' · ' + Math.abs(diff) + 'd overdue';
        else if (diff === 0) dayLabel = 'Today · ' + d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        else if (diff === 1) dayLabel = 'Tomorrow · ' + d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        else dayLabel = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      }

      const labelCls = isOverdue ? 'overdue-day' : isToday ? 'today-day' : 'future-day';
      const doneCount = items.filter(h => (h.status||'').toLowerCase() === 'done').length;

      html += '<div class="day-group">';
      html += '<div class="day-header">';
      html += '<div class="day-label ' + labelCls + '">' + dayLabel + '</div>';
      html += '<div class="day-line"></div>';
      html += '<div class="day-count">' + doneCount + '/' + items.length + '</div>';
      html += '</div>';

      const dayItems = [...items].sort((a,b) => {
        const aDone = (a.status||'').toLowerCase() === 'done' ? 1 : 0;
        const bDone = (b.status||'').toLowerCase() === 'done' ? 1 : 0;
        return aDone - bDone;
      });

      dayItems.forEach(h => {
        const info = getStatusInfo(h);
        const isDone = info.cls === 'done';
        html += '<div class="hw-card hw-card-' + info.cls + '">';
        html += '<div style="flex:1;display:flex;align-items:center;gap:8px;padding:11px 16px;cursor:pointer;min-width:0" onclick=\'openHWDrawer(' + JSON.stringify(h) + ')\'>';
        html += '<div class="hw-status-dot ' + info.cls + '"></div>';
        html += '<div class="hw-card-body">';
        html += '<div class="hw-name' + (isDone ? ' done-name' : '') + '">' + escHtml(h.name||'Untitled') + '</div>';
        const tags = [];
        if (h.subject) tags.push('<span class="hw-tag hw-tag-subject ' + subjectColorClass(h.subject) + '">' + escHtml(h.subject) + '</span>');
        if (h.due) {
          const dueCls = info.cls === 'overdue' ? 'due-overdue' : (h.due === today ? 'due-today' : '');
          tags.push('<span class="hw-tag hw-tag-due ' + dueCls + '">📅 ' + formatDue(h.due) + '</span>');
        }
        if (h.priority) tags.push('<span class="hw-tag hw-tag-p' + escHtml(String(h.priority)) + '">P' + escHtml(String(h.priority)) + '</span>');
        if (tags.length) html += '<div class="hw-tags">' + tags.join('') + '</div>';
        html += '</div>';
        html += '<span class="hw-badge ' + info.badgeCls + '">' + info.badge + '</span>';
        html += '</div>';
        html += '<button onclick="deleteHomework(' + h.rowIndex + ',\'' + escHtml(h.name||'').replace(/'/g,"\\'") + '\',\'' + escHtml(h.subject||'') + '\',\'' + escHtml(h.due||'') + '\',\'' + escHtml(h.priority||'') + '\',this)" style="flex-shrink:0;width:36px;height:36px;margin-right:8px;border-radius:8px;border:1px solid rgba(255,71,87,.3);background:rgba(255,71,87,.08);color:#ff4757;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1">×</button>';
        html += '</div>';
      });

      html += '</div>';
    });

    html += '</div>';
  }

  // Cancelled HW log
  const cancelled = data.cancelled || [];
  if (cancelled.length > 0) {
    html += '<div class="section">';
    html += '<div class="section-title">Cancelled<span class="section-title-bar"></span></div>';
    cancelled.forEach(h => {
      html += '<div class="hw-card hw-card-overdue" style="opacity:.55">';
      html += '<div style="flex:1;display:flex;align-items:center;gap:8px;padding:11px 14px;min-width:0">';
      html += '<div class="hw-status-dot" style="background:var(--red);flex-shrink:0"></div>';
      html += '<div class="hw-card-body" style="flex:1;min-width:0">';
      html += '<div class="hw-name done-name">' + escHtml(h.name||'Untitled') + '</div>';
      const meta = [
        h.subject ? escHtml(h.subject) : '',
        h.due ? 'Due ' + formatDue(h.due) : '',
        h.reason ? escHtml(h.reason) : ''
      ].filter(Boolean).join(' · ');
      if (meta) html += '<div class="hw-meta">' + meta + '</div>';
      html += '<div class="hw-meta" style="margin-top:2px">' + formatTime(h.timestamp) + '</div>';
      html += '</div>';
      html += '</div>';
      html += '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;padding-right:10px">';
      html += '<span class="hw-badge badge-overdue">Cancelled</span>';
      html += '<button onclick="deleteCancelled(' + h.rowIndex + ',this)" style="width:28px;height:28px;border-radius:8px;border:1px solid rgba(255,71,87,.3);background:rgba(255,71,87,.08);color:#ff4757;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;line-height:1">×</button>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Activity Feed
  if (activity.length > 0) {
    html += '<div class="section">';
    html += '<div class="section-title">Recent Activity<span class="section-title-bar"></span></div>';
    activity.slice(0,12).forEach(item => {
      const action = (item.action||'other').toLowerCase();
      const iconCls = ['added','completed','deleted','status_change'].includes(action) ? action : 'other';
      html += '<div class="activity-item" style="display:flex;align-items:center;gap:8px">';
      html += '<div class="activity-icon ' + iconCls + '" style="flex-shrink:0">' + actionIcon(action) + '</div>';
      html += '<div style="flex:1;min-width:0"><div class="activity-text">' + actionText(item) + '</div>';
      html += '<div class="activity-time">' + formatTime(item.timestamp) + '</div></div>';
      html += '<button onclick="deleteActivity(' + item.rowIndex + ',this)" style="width:28px;height:28px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;line-height:1">×</button>';
      html += '</div>';
    });
    html += '</div>';
  }

  if (hw.length === 0 && activity.length === 0 && dailyGoals.length === 0) {
    html += '<div class="empty-state"><div class="icon">📋</div>';
    html += '<p>Nothing tracked yet.<br>Data will appear here once Tomas uses the app.</p></div>';
  }

  $('#app').innerHTML = html;
}

// ── History Panel ──────────────────────────────────────────
var _historyTab = 'all';

function openHistory() {
  document.getElementById('history-panel').classList.add('open');
  renderHistory(_historyTab);
}

function closeHistory() {
  document.getElementById('history-panel').classList.remove('open');
}

function setHistoryTab(tab, btn) {
  _historyTab = tab;
  document.querySelectorAll('.htab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory(tab);
}

function renderHistory(tab) {
  const body = document.getElementById('history-body');
  if (!body) return;
  const d = window._lastData;
  if (!d) { body.innerHTML = '<div class="hlog-empty">No data loaded yet.</div>'; return; }

  // Build unified timeline entries
  let entries = [];

  // Activity log entries
  (d.activity || []).forEach(a => {
    entries.push({
      ts: a.timestamp,
      type: a.action || 'other',
      label: actionText(a),
      sub: a.subject || '',
      category: a.action === 'check_in' ? 'checkin' : a.action === 'deleted' ? 'deleted' : 'homework'
    });
  });

  // Check-ins (if not already in activity log)
  (d.checkIns || []).forEach(ci => {
    if (!(d.activity || []).some(a => a.action === 'check_in' && String(a.name).includes(ci.week))) {
      entries.push({
        ts: ci.savedAt || ci.week,
        type: 'check_in',
        label: 'Sunday Check-In saved — <strong>Week of ' + escHtml(String(ci.week)) + '</strong>',
        sub: '',
        category: 'checkin'
      });
    }
  });

  // Daily goals
  (d.dailyGoals || []).forEach(g => {
    const goals = [g.goal1, g.goal2, g.goal3].filter(Boolean);
    if (goals.length) {
      const done = [g.done1, g.done2, g.done3].filter(Boolean).length;
      entries.push({
        ts: g.syncedAt || g.date,
        type: 'other',
        label: 'Big 3 set — <strong>' + done + '/' + goals.length + ' completed</strong>: ' + goals.map(x => escHtml(x)).join(', '),
        sub: '',
        category: 'goals'
      });
    }
  });

  // Cancelled HW
  (d.cancelled || []).forEach(c => {
    entries.push({
      ts: c.timestamp,
      type: 'cancelled',
      label: '<strong>' + escHtml(c.name || 'Untitled') + '</strong> cancelled' + (c.reason ? ' — ' + escHtml(c.reason) : ''),
      sub: c.subject || '',
      category: 'cancelled'
    });
  });

  // Filter by tab
  if (tab !== 'all') {
    entries = entries.filter(e => e.category === tab);
  }

  // Sort newest first
  entries.sort((a, b) => {
    const ta = a.ts ? new Date(a.ts).getTime() : 0;
    const tb = b.ts ? new Date(b.ts).getTime() : 0;
    return tb - ta;
  });

  if (!entries.length) {
    body.innerHTML = '<div class="hlog-empty">Nothing here yet.</div>';
    return;
  }

  // Group by date
  const groups = {};
  entries.forEach(e => {
    const d2 = e.ts ? new Date(e.ts) : null;
    const key = d2 && !isNaN(d2) ? d2.toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric',year:'numeric'}) : 'Unknown date';
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });

  let html = '';
  Object.keys(groups).forEach(day => {
    html += '<div class="hlog-day">' + day + '</div>';
    groups[day].forEach(e => {
      const dotCls = e.type === 'check_in' ? 'check_in' : e.type === 'cancelled' ? 'cancelled' : (e.type || 'other');
      html += '<div class="hlog-item">';
      html += '<div class="hlog-dot ' + dotCls + '"></div>';
      html += '<div style="flex:1;min-width:0">';
      html += '<div class="hlog-text">' + e.label + (e.sub ? ' <span style="color:var(--text3)">· ' + escHtml(e.sub) + '</span>' : '') + '</div>';
      if (e.ts) html += '<div class="hlog-time">' + formatTime(e.ts) + '</div>';
      html += '</div></div>';
    });
  });

  body.innerHTML = html;
}

function renderInsightBanner(hw, today) {
  const overdue = hw.filter(h => {
    const s = (h.status||'not-started').toLowerCase();
    return s !== 'done' && h.due && h.due < today;
  });
  const done = hw.filter(h => (h.status||'').toLowerCase() === 'done');
  const active = hw.filter(h => (h.status||'').toLowerCase() === 'in-progress');

  if (overdue.length === 0 && hw.length === 0) {
    return '<div class="insight-banner ok"><span class="insight-icon">✓</span><span class="insight-text">No homework assigned right now.</span></div>';
  }
  if (overdue.length === 0 && done.length === hw.length && hw.length > 0) {
    return '<div class="insight-banner ok"><span class="insight-icon">🎉</span><span class="insight-text"><strong>All caught up!</strong> Every assignment is done.</span></div>';
  }
  if (overdue.length > 0) {
    const names = overdue.slice(0,2).map(h => '<strong>' + escHtml(h.name) + '</strong>').join(', ');
    const more = overdue.length > 2 ? ' +' + (overdue.length-2) + ' more' : '';
    return '<div class="insight-banner alert"><span class="insight-icon">⚠</span><span class="insight-text">' + overdue.length + ' item' + (overdue.length>1?'s are':' is') + ' overdue — ' + names + more + '</span></div>';
  }
  if (active.length > 0) {
    return '<div class="insight-banner warn"><span class="insight-icon">⏳</span><span class="insight-text"><strong>' + active.length + ' in progress</strong> — Tomas is working on it.</span></div>';
  }
  return '<div class="insight-banner warn"><span class="insight-icon">📚</span><span class="insight-text"><strong>' + hw.length + ' assignment' + (hw.length>1?'s':'')+' pending.</strong> None started yet.</span></div>';
}

function renderRecentActivity(activity) {
  const recent = (activity || []).filter(a => a.action !== 'big3_locked').slice(0,5);
  let html = '<div class="section"><div class="section-title">Recent Activity<span class="section-title-bar"></span></div>';
  html += '<div class="activity-feed-card">';
  if (!recent.length) {
    html += '<div class="feed-empty">No activity yet.</div>';
  } else {
    recent.forEach(a => {
      const iconMap = {added:'＋',completed:'✓',deleted:'✕',status_change:'→'};
      const iconCls = ['added','completed','deleted','status_change'].includes(a.action) ? a.action : 'other';
      const icon = iconMap[a.action] || '•';
      html += '<div class="activity-feed-row">';
      html += '<div class="feed-icon ' + iconCls + '">' + icon + '</div>';
      html += '<div class="feed-body">';
      html += '<div class="feed-text">' + actionText(a) + '</div>';
      html += '<div class="feed-time">' + formatTime(a.timestamp) + '</div>';
      html += '</div></div>';
    });
  }
  html += '</div></div>';
  return html;
}

async function fetchData() {
  if (!SCRIPT_URL) { showSetup(); return; }

  const dot = $('#syncDot');
  dot.className = 'sync-dot syncing';
  $('#syncText').textContent = 'Syncing...';

  try {
    const cacheBust = SCRIPT_URL + (SCRIPT_URL.includes('?') ? '&' : '?') + '_t=' + Date.now();
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 15000);
    let resp;
    try {
      resp = await fetch(cacheBust, {
        method: 'GET',
        redirect: 'follow',
        cache: 'no-store',
        signal: controller.signal
      });
    } finally {
      clearTimeout(timer);
    }
    const data = await resp.json();
    window._lastData = data;
    if (data.status === 'ok') {
      renderDashboard(data);
      dot.className = 'sync-dot';
      const d = data.fetchedAt ? new Date(data.fetchedAt) : new Date();
      const timeStr = isNaN(d.getTime()) ? 'just now' : d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
      $('#syncText').textContent = 'Updated ' + timeStr;
    } else {
      showError(data.message || 'Unknown error');
    }
  } catch(e) {
    dot.className = 'sync-dot error';
    $('#syncText').textContent = 'Connection error';
    showError('Could not connect. Try refreshing.');
    console.error('Fetch error:', e);
  }
}

document.addEventListener('DOMContentLoaded', function() {

  if (allCheck) {
    allCheck.addEventListener('change', () => boxes.forEach(b => b.checked = allCheck.checked));

      allCheck.checked = [...boxes].every(x => x.checked);

});
async function executeReset() {
  const boxes = document.querySelectorAll('.reset-sheet-check:checked');
  const sheets = [...boxes].map(b => b.value);
  if (!sheets.length) { alert('Select at least one category.'); return; }
  const labels = sheets.join(', ');
  if (!confirm('Clear: ' + labels + '?\nThis cannot be undone.')) return;
  closeResetModal();
  try {
    const resp = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({action: 'reset_all', sheets: sheets})
    });
    const data = await resp.json();
    if (data.status === 'ok') {
      $('#syncText').textContent = 'Reset: ' + labels;
      setTimeout(() => location.reload(), 800);
    } else {
      alert('Reset failed: ' + (data.message || 'Unknown error'));
    }
  } catch(e) {
    alert('Could not connect to reset.');
  }
}

/* ===== HW DETAIL DRAWER ===== */
(function(){
  document.body.insertAdjacentHTML('beforeend', `
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="hwDrawer">
      <div class="drawer-handle"></div>
      <div id="drawerContent"></div>
      <button class="drawer-close" onclick="closeDrawer()">Dismiss</button>
    </div>
  `);

  window.openHWDrawer = function(hw) {
    const isDone = (hw.status||'').toLowerCase() === 'done';
    const today = new Date().toISOString().slice(0,10);
    const isOverdue = hw.due && hw.due < today && !isDone;

    const statusMap = {
      'done':        {bg:'var(--green-bg)', color:'var(--green)',   border:'var(--green-border)',  label:'Done'},
      'in progress': {bg:'var(--blue-bg)',  color:'var(--blue)',    border:'var(--blue-border)',   label:'In Progress'},
      'overdue':     {bg:'var(--red-bg)',   color:'var(--red)',     border:'var(--red-border)',    label:'Overdue'},
      'to do':       {bg:'var(--amber-bg)', color:'var(--amber)',   border:'var(--amber-border)',  label:'To Do'},
    };
    const statusKey = isOverdue ? 'overdue' : (hw.status||'to do').toLowerCase();
    const sc = statusMap[statusKey] || statusMap['to do'];

    const priLabel = hw.priority == 1 ? 'P1 — Critical' : hw.priority == 2 ? 'P2 — Important' : hw.priority == 3 ? 'P3 — Normal' : '—';
    const dueLabel = hw.due ? new Date(hw.due + 'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}) : 'No due date';
    const addedLabel = hw.added ? new Date(hw.added + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—';

    document.getElementById('drawerContent').innerHTML = `
      ${hw.subject ? `<div class="drawer-subject-badge">${escHtml(hw.subject)}</div>` : ''}
      <div class="drawer-name${isDone?' done-name':''}">${escHtml(hw.name||'Untitled')}</div>
      <div class="drawer-status-row" style="background:${sc.bg};border-color:${sc.border}">
        <span style="width:8px;height:8px;border-radius:50%;background:${sc.color};flex-shrink:0;display:inline-block"></span>
        <span style="font-size:13px;font-weight:600;color:${sc.color}">${sc.label}</span>
        ${isOverdue ? '<span style="font-size:12px;color:var(--text3);margin-left:auto">' + Math.abs(Math.round((new Date(hw.due+'T12:00:00') - new Date(today+'T12:00:00'))/86400000)) + 'd overdue</span>' : ''}
      </div>
      <div class="drawer-grid">
        <div class="drawer-cell">
          <div class="drawer-cell-lbl">Due</div>
          <div class="drawer-cell-val" style="${isOverdue?'color:var(--red)':''}">${dueLabel}</div>
        </div>
        <div class="drawer-cell">
          <div class="drawer-cell-lbl">Priority</div>
          <div class="drawer-cell-val">${priLabel}</div>
        </div>
        <div class="drawer-cell">
          <div class="drawer-cell-lbl">Subject</div>
          <div class="drawer-cell-val">${escHtml(hw.subject||'—')}</div>
        </div>
        <div class="drawer-cell">
          <div class="drawer-cell-lbl">Added</div>
          <div class="drawer-cell-val">${addedLabel}</div>
        </div>
      </div>
    `;
    document.getElementById('drawerOverlay').classList.add('show');
    document.getElementById('hwDrawer').classList.add('show');
  };

  window.closeDrawer = function() {
    document.getElementById('drawerOverlay').classList.remove('show');
    document.getElementById('hwDrawer').classList.remove('show');
  };

  document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);
})();
</script>
